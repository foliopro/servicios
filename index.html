<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <title>EQUITY V2.0 - Plataforma Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .panel { display: none; }
        .active { display: block !important; }
        body { background-color: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 border-r border-cyan-900 p-6 flex flex-col gap-2 z-20">
        <div class="mb-8 text-center">
            <img src="https://i.ibb.co/VYz8GWMV/logo.jpg" alt="Logo" class="mx-auto mb-2 w-24">
            <h1 class="text-cyan-400 font-bold text-xl">EQUITY V2.0</h1>
        </div>
        <button onclick="show('empresa')" class="block w-full text-left px-4 py-2 hover:bg-slate-800 rounded">Datos Empresa</button>
        <button onclick="show('edificios')" class="block w-full text-left px-4 py-2 hover:bg-slate-800 rounded">Gestión Edificios</button>
        <button onclick="show('aptos')" class="block w-full text-left px-4 py-2 hover:bg-slate-800 rounded">Apartamentos</button>
        <button onclick="show('liquidacion')" class="block w-full text-left px-4 py-2 hover:bg-slate-800 rounded">Liquidación</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto relative">
        <div id="marca-inicio" class="absolute inset-0 flex items-center justify-center bg-[#0f172a] z-50">
            <img src="https://i.ibb.co/nsh1g3dN/equityph.png" class="w-1/2 max-w-xl">
        </div>

        <div id="empresa" class="panel">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400">Datos Empresa</h2>
            <div class="grid grid-cols-2 gap-4 bg-slate-800 p-6 rounded">
                <input id="eNom" placeholder="Nombre Empresa" class="bg-slate-700 p-2 rounded">
                <input id="eNit" placeholder="NIT" class="bg-slate-700 p-2 rounded">
                <button onclick="db.saveEmp()" class="bg-cyan-600 p-2 col-span-2 rounded">Guardar Cambios</button>
            </div>
        </div>

        <div id="edificios" class="panel">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400">Gestión de Edificios</h2>
            <div class="mb-4 flex gap-2 flex-wrap">
                <button onclick="db.ed.add()" class="bg-green-600 px-4 py-2 rounded">Agregar</button>
                <button onclick="db.ed.mod()" class="bg-yellow-600 px-4 py-2 rounded">Modificar</button>
                <button onclick="db.ed.del()" class="bg-red-700 px-4 py-2 rounded">Borrar</button>
                <button onclick="db.export('ed')" class="bg-blue-700 px-4 py-2 rounded">JSON</button>
                <button onclick="document.getElementById('importFile').click()" class="bg-purple-700 px-4 py-2 rounded">Subir JSON</button>
                <input type="file" id="importFile" class="hidden" onchange="db.importData(event, 'ed')">
                <button onclick="db.exportExcel()" class="bg-emerald-700 px-4 py-2 rounded">Excel</button>
            </div>
            <div class="bg-slate-800 p-4 rounded grid grid-cols-2 gap-2 mb-6">
                <input id="edCod" placeholder="Cod" class="bg-slate-700 p-2">
                <input id="edNom" placeholder="Nombre" class="bg-slate-700 p-2">
                <input id="edDir" placeholder="Dirección" class="bg-slate-700 p-2">
                <input id="edTel" placeholder="Teléfono" class="bg-slate-700 p-2">
                <input id="edMail" placeholder="Correo" class="bg-slate-700 p-2 col-span-2">
            </div>
            <table class="w-full text-left bg-slate-800 rounded text-sm">
                <thead><tr class="border-b border-slate-700 text-cyan-300"><th class="p-3">Sel</th><th class="p-3">Cod</th><th class="p-3">Nombre</th><th class="p-3">Acción</th></tr></thead>
                <tbody id="tbEdificios"></tbody>
            </table>
        </div>

        <div id="aptos" class="panel">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400">Gestión de Apartamentos</h2>
            <select id="selEdificio" onchange="db.aptos.render()" class="bg-slate-700 p-2 mb-4 w-full rounded"></select>
            <div class="mb-4 flex gap-2 flex-wrap">
                <button onclick="db.aptos.add()" class="bg-green-600 px-4 py-2 rounded">Agregar</button>
                <button onclick="db.aptos.mod()" class="bg-yellow-600 px-4 py-2 rounded">Modificar</button>
                <button onclick="db.aptos.del()" class="bg-red-700 px-4 py-2 rounded">Borrar</button>
            </div>
            <div class="bg-slate-800 p-4 rounded grid grid-cols-2 gap-2 mb-6 text-sm">
                <input id="apCod" placeholder="Cod Apto" class="bg-slate-700 p-2" onblur="db.aptos.validar()">
                <select id="apTipo" class="bg-slate-700 p-2"><option>Residencial</option><option>Comercial</option><option>Otro</option></select>
                <input id="apNom" placeholder="Nombre" class="bg-slate-700 p-2">
                <input id="apID" placeholder="Num ID" class="bg-slate-700 p-2">
                <input id="apDir" placeholder="Dirección" class="bg-slate-700 p-2">
                <input id="apCiu" placeholder="Ciudad" class="bg-slate-700 p-2">
            </div>
            <table class="w-full text-left bg-slate-800 rounded text-sm">
                <thead><tr class="border-b border-slate-700 text-cyan-300"><th class="p-3">Sel</th><th class="p-3">Cod</th><th class="p-3">Nombre</th><th class="p-3">Acción</th></tr></thead>
                <tbody id="tbAptos"></tbody>
            </table>
        </div>
    </main>

    <script>
        function show(id) {
            document.getElementById('marca-inicio').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'edificios') { ['edCod','edNom','edDir','edTel','edMail'].forEach(i => document.getElementById(i).value = ''); }
            if(id === 'aptos') { db.aptos.initSelect(); }
        }

        const db = {
            ed: {
                add: () => {
                    const c = document.getElementById('edCod').value;
                    if(!c) { alert("¡El código es obligatorio!"); return; }
                    let list = JSON.parse(localStorage.getItem('ed')) || [];
                    list.push({cod: c, nom: document.getElementById('edNom').value});
                    localStorage.setItem('ed', JSON.stringify(list));
                    db.ed.render();
                },
                render: () => {
                    const list = JSON.parse(localStorage.getItem('ed')) || [];
                    document.getElementById('tbEdificios').innerHTML = list.map((e,i) => `<tr><td class="p-3"><input type="checkbox"></td><td>${e.cod}</td><td>${e.nom}</td><td><button onclick="db.ed.editar(${i})">✏️</button></td></tr>`).join('');
                }
            },
            aptos: {
                initSelect: () => {
                    const list = JSON.parse(localStorage.getItem('ed')) || [];
                    document.getElementById('selEdificio').innerHTML = '<option value="">Seleccione Edificio...</option>' + list.map(e => `<option value="${e.cod}">${e.nom}</option>`).join('');
                },
                validar: () => {
                    const edId = document.getElementById('selEdificio').value;
                    const cod = document.getElementById('apCod').value;
                    const list = JSON.parse(localStorage.getItem('aptos_' + edId)) || [];
                    if(list.find(a => a.cod === cod)) alert("¡Este código ya existe en este edificio!");
                },
                add: () => {
                    const edId = document.getElementById('selEdificio').value;
                    const cod = document.getElementById('apCod').value;
                    if(!edId || !cod) { alert("¡Faltan datos obligatorios!"); return; }
                    let list = JSON.parse(localStorage.getItem('aptos_' + edId)) || [];
                    list.push({cod: cod, nom: document.getElementById('apNom').value});
                    localStorage.setItem('aptos_' + edId, JSON.stringify(list));
                    db.aptos.render();
                },
                render: () => {
                    const edId = document.getElementById('selEdificio').value;
                    const list = JSON.parse(localStorage.getItem('aptos_' + edId)) || [];
                    document.getElementById('tbAptos').innerHTML = list.map((a,i) => `<tr><td class="p-3"><input type="checkbox"></td><td>${a.cod}</td><td>${a.nom}</td><td></td></tr>`).join('');
                }
            },
            importData: (e, key) => {
                const reader = new FileReader();
                reader.onload = (event) => { localStorage.setItem(key, event.target.result); db.ed.render(); };
                reader.readAsText(e.target.files[0]);
            },
            saveEmp: () => alert("Empresa guardada"),
            export: (key) => alert("Exportando JSON..."),
            exportExcel: () => alert("Exportando Excel...")
        };
        window.onload = () => { db.ed.render(); };
    </script>
</body>
</html>
