<div id="edificios" class="panel">
    <h1 class="text-2xl mb-6 text-cyan-400">Gestión de Edificios</h1>
    
    <div class="bg-slate-900 p-6 rounded border border-slate-700 mb-6 flex gap-4">
        <input id="newCod" placeholder="Cod Edif" class="bg-slate-800 p-2 border border-slate-700 w-24">
        <input id="newNom" placeholder="Nombre Edificio" class="bg-slate-800 p-2 border border-slate-700 flex-1">
        <button onclick="data.edificio.add()" class="bg-green-600 px-4 py-2">Agregar</button>
        <button onclick="data.edificio.guardarJSON()" class="bg-blue-600 px-4 py-2">Guardar JSON</button>
    </div>

    <table class="w-full text-left bg-slate-900 border border-slate-700">
        <thead class="bg-slate-800">
            <tr>
                <th class="p-2">Sel</th>
                <th class="p-2">Cod Edif</th>
                <th class="p-2">Nombre Edif</th>
                <th class="p-2">Acciones</th>
            </tr>
        </thead>
        <tbody id="listaEdificios"></tbody>
    </table>
    <button onclick="data.edificio.borrarSeleccionados()" class="mt-4 bg-red-600 px-4 py-2">Borrar Seleccionados</button>
</div>

<script>
    // Ampliación del objeto data para Edificios
    const data = {
        edificios: JSON.parse(localStorage.getItem('listaEdificios')) || [],
        
        edificio: {
            add: () => {
                const cod = document.getElementById('newCod').value;
                const nom = document.getElementById('newNom').value;
                if(cod && nom) {
                    data.edificios.push({ cod, nom });
                    data.edificio.render();
                }
            },
            render: () => {
                const tbody = document.getElementById('listaEdificios');
                tbody.innerHTML = '';
                data.edificios.forEach((e, index) => {
                    tbody.innerHTML += `<tr>
                        <td class="p-2"><input type="checkbox" class="edif-check" data-index="${index}"></td>
                        <td class="p-2">${e.cod}</td>
                        <td class="p-2">${e.nom}</td>
                        <td class="p-2"><button onclick="data.edificio.modificar(${index})" class="text-cyan-400">Modificar</button></td>
                    </tr>`;
                });
                localStorage.setItem('listaEdificios', JSON.stringify(data.edificios));
            },
            borrarSeleccionados: () => {
                if(confirm("¿Seguro? Si hay datos asociados, no se podrán recuperar.")) {
                    const checkboxes = document.querySelectorAll('.edif-check:checked');
                    checkboxes.forEach(chk => {
                        data.edificios.splice(chk.dataset.index, 1);
                    });
                    data.edificio.render();
                }
            },
            guardarJSON: () => {
                const dataStr = JSON.stringify(data.edificios);
                const blob = new Blob([dataStr], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "edificios.json";
                a.click();
            }
        }
    };
    
    // Inicializar lista al cargar
    data.edificio.render();
</script>
