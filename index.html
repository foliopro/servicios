<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <title>CanoServicios V2.0 - Plataforma Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .panel { display: none; }
        .active-panel { display: block !important; }
        body { background-color: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- PANEL LATERAL -->
    <aside class="w-64 bg-slate-900 border-r border-cyan-900 p-6 flex flex-col gap-2">
        <div class="mb-8 text-center">
            <img src="https://via.placeholder.com/150x50?text=CanoServicios+V2.0" alt="Logo" class="mx-auto mb-2">
            <h1 class="text-cyan-400 font-bold text-xl">CanoServicios V2.0</h1>
        </div>
        <button onclick="ui.show('empresa')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Datos Empresa</button>
        <button onclick="ui.show('edificios')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Gestión Edificios</button>
        <button onclick="ui.show('aptos')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Apartamentos</button>
        <button onclick="ui.show('liquidacion')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Liquidación</button>
    </aside>

    <!-- ÁREA DE TRABAJO -->
    <main class="flex-1 p-8 overflow-y-auto">
        
        <!-- EMPRESA -->
        <div id="empresa" class="panel active-panel">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400">Datos Empresa</h2>
            <div class="grid grid-cols-2 gap-4 max-w-2xl bg-slate-800 p-6 rounded">
                <input id="eNom" placeholder="Nombre Empresa" class="bg-slate-700 p-2 rounded">
                <input id="eNit" placeholder="NIT" class="bg-slate-700 p-2 rounded">
                <input id="eDir" placeholder="Dirección" class="bg-slate-700 p-2 rounded col-span-2">
                <button onclick="db.saveEmp()" class="bg-cyan-600 p-2 col-span-2 rounded">Guardar Cambios</button>
            </div>
        </div>

        <!-- EDIFICIOS -->
        <div id="edificios" class="panel">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400">Gestión de Edificios</h2>
            <!-- Botones siempre arriba -->
            <div class="bg-slate-800 p-4 rounded flex gap-2 mb-4 sticky top-0 z-10">
                <input id="edCod" placeholder="Cod" class="bg-slate-700 p-2 w-20">
                <input id="edNom" placeholder="Nombre Edificio" class="bg-slate-700 p-2 flex-1">
                <button onclick="db.ed.add()" class="bg-green-600 px-4 py-2 rounded">Agregar</button>
                <button onclick="db.ed.mod()" class="bg-yellow-600 px-4 py-2 rounded">Modificar</button>
                <button onclick="db.export('ed')" class="bg-blue-700 px-4 py-2 rounded">JSON</button>
                <button onclick="db.exportExcel()" class="bg-emerald-700 px-4 py-2 rounded">Excel</button>
                <input type="file" id="importEd" class="hidden" onchange="db.import(event, 'ed')">
                <button onclick="document.getElementById('importEd').click()" class="bg-purple-700 px-4 py-2 rounded">Subir JSON</button>
            </div>
            <table class="w-full text-left bg-slate-800 rounded">
                <thead><tr class="border-b border-slate-700"><th class="p-3">Sel</th><th class="p-3">Cod</th><th class="p-3">Nombre</th><th class="p-3">Acción</th></tr></thead>
                <tbody id="tbEdificios"></tbody>
            </table>
            <button onclick="db.ed.del()" class="mt-4 bg-red-700 px-4 py-2 rounded">Borrar Seleccionados</button>
        </div>

        <!-- APARTAMENTOS Y LIQUIDACIÓN -->
        <div id="aptos" class="panel"><h2 class="text-3xl text-cyan-400">Apartamentos</h2></div>
        <div id="liquidacion" class="panel"><h2 class="text-3xl text-cyan-400">Liquidación</h2></div>
    </main>

    <script>
        const ui = { show: (id) => { 
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel')); 
            document.getElementById(id).classList.add('active-panel'); 
        }};

        const db = {
            init: () => { db.ed.render(); },
            ed: {
                add: () => {
                    const cod = document.getElementById('edCod');
                    const nom = document.getElementById('edNom');
                    let list = JSON.parse(localStorage.getItem('ed')) || [];
                    if(list.find(e => e.cod === cod.value)) { alert("Error: Código duplicado"); return; }
                    list.push({cod: cod.value, nom: nom.value});
                    localStorage.setItem('ed', JSON.stringify(list));
                    cod.value = ''; nom.value = '';
                    db.ed.render();
                },
                load: (i) => {
                    const e = JSON.parse(localStorage.getItem('ed'))[i];
                    document.getElementById('edCod').value = e.cod;
                    document.getElementById('edNom').value = e.nom;
                },
                mod: () => {
                    const cod = document.getElementById('edCod').value;
                    const nom = document.getElementById('edNom').value;
                    let list = JSON.parse(localStorage.getItem('ed'));
                    const i = list.findIndex(e => e.cod === cod);
                    if(i !== -1) { list[i].nom = nom; localStorage.setItem('ed', JSON.stringify(list)); db.ed.render(); }
                },
                render: () => {
                    const list = JSON.parse(localStorage.getItem('ed')) || [];
                    document.getElementById('tbEdificios').innerHTML = list.map((e, i) => 
                        `<tr><td class="p-3"><input type="checkbox" class="edCheck" data-i="${i}"></td><td class="p-3">${e.cod}</td><td class="p-3">${e.nom}</td><td class="p-3"><button onclick="db.ed.load(${i})" class="text-yellow-400">Cargar</button></td></tr>`).join('');
                },
                del: () => {
                    let list = JSON.parse(localStorage.getItem('ed'));
                    document.querySelectorAll('.edCheck:checked').forEach(c => list.splice(c.dataset.i, 1));
                    localStorage.setItem('ed', JSON.stringify(list));
                    db.ed.render();
                }
            },
            exportExcel: () => {
                const emp = JSON.parse(localStorage.getItem('emp')) || {n: 'Empresa'};
                const list = JSON.parse(localStorage.getItem('ed')) || [];
                let csv = `Empresa: ${emp.n}\n\nCod,Nombre\n`;
                list.forEach(e => csv += `${e.cod},${e.nom}\n`);
                const a = document.createElement('a');
                a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
                a.download = "edificios.csv"; a.click();
            },
            export: (key) => {
                const a = document.createElement('a');
                a.href = "data:text/json;charset=utf-8," + encodeURIComponent(localStorage.getItem(key));
                a.download = key + ".json"; a.click();
            },
            import: (e, key) => {
                const reader = new FileReader();
                reader.onload = (ev) => { localStorage.setItem(key, ev.target.result); db.ed.render(); };
                reader.readAsText(e.target.files[0]);
            }
        };
        window.onload = db.init;
    </script>
</body>
</html>
