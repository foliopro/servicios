<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <title>EQUITY V2.0 - Plataforma Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .panel { display: none; }
        .active { display: block !important; }
        body { background-color: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- PANEL LATERAL -->
    <aside class="w-64 bg-slate-900 border-r border-cyan-900 p-6 flex flex-col gap-2 z-20">
        <div class="mb-8 text-center">
            <img src="https://i.ibb.co/VYz8GWMV/logo.jpg" alt="Logo" class="mx-auto mb-2 w-24">
            <h1 class="text-cyan-400 font-bold text-xl">EQUITY V2.0</h1>
        </div>
        <button onclick="show('empresa')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Datos Empresa</button>
        <button onclick="show('edificios')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Gestión Edificios</button>
        <button onclick="show('aptos')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Apartamentos</button>
        <button onclick="show('liquidacion')" class="text-left px-4 py-2 hover:bg-slate-800 rounded">Liquidación</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto relative">
        <div id="marca-inicio" class="absolute inset-0 flex items-center justify-center bg-[#0f172a] z-50">
            <img src="https://i.ibb.co/nsh1g3dN/equityph.png" class="w-1/2 max-w-xl">
        </div>

        <div id="modalVista" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50">
            <div class="bg-slate-800 p-8 rounded-lg w-96 border border-cyan-500">
                <div class="flex justify-between mb-4">
                    <h3 class="text-xl font-bold text-cyan-400">Detalle del Edificio</h3>
                    <button onclick="document.getElementById('modalVista').classList.add('hidden')" class="text-red-500 font-bold">X</button>
                </div>
                <div id="contenidoModal" class="space-y-2"></div>
            </div>
        </div>

        <!-- SECCIONES -->
        <div id="empresa" class="panel">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400">Datos Empresa</h2>
            <div class="grid grid-cols-2 gap-4 w-full bg-slate-800 p-6 rounded">
                <input id="eNom" placeholder="Nombre Empresa" class="bg-slate-700 p-2 rounded">
                <input id="eNit" placeholder="NIT" class="bg-slate-700 p-2 rounded">
                <button onclick="db.saveEmp()" class="bg-cyan-600 p-2 col-span-2 rounded">Guardar Cambios</button>
            </div>
        </div>

        <!-- EDIFICIOS -->
        <div id="edificios" class="panel">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400">Gestión de Edificios</h2>
            <div class="mb-4 flex gap-2 flex-wrap">
                <button onclick="db.ed.add()" class="bg-green-600 px-4 py-2 rounded">Agregar</button>
                <button onclick="db.ed.mod()" class="bg-yellow-600 px-4 py-2 rounded">Modificar</button>
                <button onclick="db.ed.del()" class="bg-red-700 px-4 py-2 rounded">Borrar</button>
                <button onclick="db.export('ed')" class="bg-blue-700 px-4 py-2 rounded">Exportar JSON</button>
                <button onclick="document.getElementById('importFile').click()" class="bg-purple-700 px-4 py-2 rounded">Subir JSON</button>
                <input type="file" id="importFile" class="hidden" onchange="db.import(event)">
                <button onclick="db.exportExcel()" class="bg-emerald-700 px-4 py-2 rounded">Excel</button>
            </div>
            <div class="bg-slate-800 p-4 rounded grid grid-cols-2 gap-2 mb-6">
                <input id="edCod" placeholder="Cod" class="bg-slate-700 p-2">
                <input id="edNom" placeholder="Nombre" class="bg-slate-700 p-2">
                <input id="edDir" placeholder="Dirección" class="bg-slate-700 p-2">
                <input id="edTel" placeholder="Teléfono" class="bg-slate-700 p-2">
                <input id="edMail" placeholder="Correo" class="bg-slate-700 p-2 col-span-2">
            </div>
            <table class="w-full text-left bg-slate-800 rounded text-sm">
                <thead><tr class="border-b border-slate-700 text-cyan-300"><th class="p-3">Sel</th><th class="p-3">Cod</th><th class="p-3">Nombre</th><th class="p-3">Acción</th></tr></thead>
                <tbody id="tbEdificios"></tbody>
            </table>
        </div>
        
        <div id="aptos" class="panel"><h2 class="text-3xl text-cyan-400">Apartamentos</h2></div>
        <div id="liquidacion" class="panel"><h2 class="text-3xl text-cyan-400">Liquidación</h2></div>
    </main>

    <script>
        function limpiarEdificios() { ['edCod', 'edNom', 'edDir', 'edTel', 'edMail'].forEach(id => document.getElementById(id).value = ''); }

        function show(id) {
            document.getElementById('marca-inicio').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'edificios') limpiarEdificios();
        }

        const db = {
            ed: {
                add: () => {
                    const c = document.getElementById('edCod').value;
                    if(!c) { alert("Error: No se puede agregar registros en blanco (el código es obligatorio)"); return; }
                    let list = JSON.parse(localStorage.getItem('ed')) || [];
                    if(list.find(e => e.cod === c)) { alert("Error: Código duplicado"); return; }
                    list.push({cod: c, nom: document.getElementById('edNom').value, dir: document.getElementById('edDir').value, tel: document.getElementById('edTel').value, mail: document.getElementById('edMail').value});
                    localStorage.setItem('ed', JSON.stringify(list));
                    limpiarEdificios(); db.ed.render();
                },
                render: () => {
                    const list = JSON.parse(localStorage.getItem('ed')) || [];
                    document.getElementById('tbEdificios').innerHTML = list.map((e, i) => 
                        `<tr><td class="p-3"><input type="checkbox" class="edCheck" data-i="${i}"></td><td class="p-3">${e.cod}</td><td class="p-3">${e.nom}</td><td class="p-3"><button onclick="db.ed.editar(${i})">✏️</button></td></tr>`).join('');
                },
                editar: (i) => {
                    const e = JSON.parse(localStorage.getItem('ed'))[i];
                    document.getElementById('edCod').value = e.cod; document.getElementById('edNom').value = e.nom; document.getElementById('edDir').value = e.dir; document.getElementById('edTel').value = e.tel; document.getElementById('edMail').value = e.mail;
                },
                del: () => {
                    let list = JSON.parse(localStorage.getItem('ed'));
                    document.querySelectorAll('.edCheck:checked').forEach(c => list.splice(c.dataset.i, 1));
                    localStorage.setItem('ed', JSON.stringify(list)); db.ed.render();
                }
            },
            export: (key) => {
                const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(localStorage.getItem(key)); a.download = key + ".json"; a.click();
            },
            import: (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => { localStorage.setItem('ed', event.target.result); db.ed.render(); };
                reader.readAsText(file);
            },
            init: () => { db.ed.render(); }
        };
        window.onload = db.init;
    </script>
</body>
</html>
