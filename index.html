<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-section { display: none; }
        .active { display: block !important; }
        body { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-64 bg-slate-900 p-6">
        <img src="https://i.ibb.co/VYz8GWMV/logo.jpg" class="w-24 mb-4 mx-auto">
        <button onclick="show('empresa')" class="block w-full text-left py-2">Datos Empresa</button>
        <button onclick="show('edificios')" class="block w-full text-left py-2">Gestión Edificios</button>
    </aside>

    <main class="flex-1 p-8 relative">
        <div id="marca-inicio" class="absolute inset-0 flex items-center justify-center bg-[#0f172a] z-50">
            <img src="https://i.ibb.co/nsh1g3dN/equityph.png" class="w-1/2">
        </div>

        <div id="empresa" class="page-section">
            <h1 class="text-3xl text-cyan-400">Datos Empresa</h1>
            </div>

        <div id="edificios" class="page-section">
            <h1 class="text-3xl text-cyan-400">Gestión de Edificios</h1>
            </div>
    </main>

    <script>
        function show(id) {
            // 1. Ocultar logo marca
            document.getElementById('marca-inicio').style.display = 'none';
            // 2. Ocultar todas las secciones
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            // 3. Mostrar la sección elegida
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
